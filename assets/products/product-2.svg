  <circle cx="80"  cy="28"  r="3.5" fill="#5ECFA8" opacity=".9"/>
  <circle cx="128" cy="55"  r="3"   fill="#B8A9F5" opacity=".8"/>
  <circle cx="32"  cy="55"  r="3"   fill="#85CFFF" opacity=".8"/>
  <circle cx="80"  cy="132" r="3"   fill="#5ECFA8" opacity=".6"/>
