<svg viewBox="0 0 400 300" fill="none" xmlns="http://www.w3.org/2000/svg" width="400" height="300">
  <!-- Pop Fidget Hexagonal — product photography mockup -->
  <defs>
    <radialGradient id="g1bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#0F2A20"/>
      <stop offset="100%" stop-color="#050509"/>
    </radialGradient>
    <radialGradient id="g1glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#5ECFA8" stop-opacity=".25"/>
      <stop offset="100%" stop-color="#5ECFA8" stop-opacity="0"/>
    </radialGradient>
    <filter id="g1blur"><feGaussianBlur stdDeviation="18"/></filter>
    <filter id="g1soft"><feGaussianBlur stdDeviation="2"/></filter>
  </defs>
  <rect width="400" height="300" fill="url(#g1bg)"/>
  <!-- Background glow -->
  <ellipse cx="200" cy="150" rx="160" ry="120" fill="url(#g1glow)" filter="url(#g1blur)"/>
  <!-- Surface reflection -->
  <ellipse cx="200" cy="240" rx="100" ry="18" fill="#5ECFA8" opacity=".06" filter="url(#g1soft)"/>
  <!-- Product: large pop fidget grid, centered -->
  <g transform="translate(200,145) scale(2.2)">
    <g stroke-width="1.6" fill-opacity=".18">
      <circle cx="-36" cy="-36" r="16" stroke="#5ECFA8" fill="#5ECFA8"/>
      <circle cx="0"   cy="-36" r="16" stroke="#B8A9F5" fill="#B8A9F5"/>
      <circle cx="36"  cy="-36" r="16" stroke="#5ECFA8" fill="#5ECFA8"/>
      <circle cx="-18" cy="0"   r="16" stroke="#FFB085" fill="#FFB085"/>
      <circle cx="18"  cy="0"   r="16" stroke="#5ECFA8" fill="#5ECFA8"/>
      <circle cx="-36" cy="36"  r="16" stroke="#85CFFF" fill="#85CFFF"/>
      <circle cx="0"   cy="36"  r="16" stroke="#B8A9F5" fill="#B8A9F5"/>
      <circle cx="36"  cy="36"  r="16" stroke="#FF8585" fill="#FF8585"/>
    </g>
    <circle cx="0"   cy="-36" r="5" fill="#B8A9F5" opacity=".9"/>
    <circle cx="18"  cy="0"   r="5" fill="#5ECFA8" opacity=".9"/>
    <circle cx="0"   cy="36"  r="5" fill="#B8A9F5" opacity=".8"/>
  </g>
  <!-- Label -->
  <text x="200" y="276" font-family="system-ui,sans-serif" font-size="11" fill="rgba(255,255,255,.4)" text-anchor="middle" letter-spacing="2">POP FIDGET HEXAGONAL</text>
</svg>
