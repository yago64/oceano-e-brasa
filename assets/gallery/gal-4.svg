<svg viewBox="0 0 400 300" fill="none" xmlns="http://www.w3.org/2000/svg" width="400" height="300">
  <!-- Mandala Spinner — product photography mockup -->
  <defs>
    <radialGradient id="g4bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1A1030"/>
      <stop offset="100%" stop-color="#050509"/>
    </radialGradient>
    <radialGradient id="g4glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#B8A9F5" stop-opacity=".28"/>
      <stop offset="100%" stop-color="#B8A9F5" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="g4p1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#B8A9F5" stop-opacity=".7"/>
      <stop offset="100%" stop-color="#B8A9F5" stop-opacity=".12"/>
    </linearGradient>
    <linearGradient id="g4p2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5ECFA8" stop-opacity=".6"/>
      <stop offset="100%" stop-color="#5ECFA8" stop-opacity=".1"/>
    </linearGradient>
    <filter id="g4blur"><feGaussianBlur stdDeviation="22"/></filter>
  </defs>
  <rect width="400" height="300" fill="url(#g4bg)"/>
  <ellipse cx="200" cy="150" rx="140" ry="120" fill="url(#g4glow)" filter="url(#g4blur)"/>
  <!-- Shadow -->
  <ellipse cx="200" cy="238" rx="85" ry="13" fill="#B8A9F5" opacity=".08"/>
  <!-- Mandala scaled up -->
  <g transform="translate(200,148)">
    <circle r="90" stroke="rgba(184,169,245,.2)" stroke-width="1.5"/>
    <circle r="70" stroke="rgba(94,207,168,.15)"   stroke-width="1.2"/>
    <circle r="50" stroke="rgba(184,169,245,.12)"   stroke-width="1"/>
    <g>
      <ellipse rx="18" ry="52" fill="url(#g4p1)" transform="rotate(0)"   opacity=".8"/>
      <ellipse rx="18" ry="52" fill="url(#g4p2)" transform="rotate(45)"  opacity=".7"/>
      <ellipse rx="18" ry="52" fill="url(#g4p1)" transform="rotate(90)"  opacity=".8"/>
      <ellipse rx="18" ry="52" fill="url(#g4p2)" transform="rotate(135)" opacity=".7"/>
      <ellipse rx="18" ry="52" fill="url(#g4p1)" transform="rotate(180)" opacity=".8"/>
      <ellipse rx="18" ry="52" fill="url(#g4p2)" transform="rotate(225)" opacity=".7"/>
      <ellipse rx="18" ry="52" fill="url(#g4p1)" transform="rotate(270)" opacity=".8"/>
      <ellipse rx="18" ry="52" fill="url(#g4p2)" transform="rotate(315)" opacity=".7"/>
    </g>
    <circle r="18" fill="rgba(184,169,245,.2)" stroke="rgba(184,169,245,.8)" stroke-width="2"/>
    <circle r="6"  fill="#B8A9F5" opacity=".95"/>
    <g stroke="rgba(94,207,168,.5)" stroke-width="1.2" fill="none">
      <polygon points="0,-38 10,-27 0,-16 -10,-27" transform="rotate(0)"/>
      <polygon points="0,-38 10,-27 0,-16 -10,-27" transform="rotate(45)"/>
      <polygon points="0,-38 10,-27 0,-16 -10,-27" transform="rotate(90)"/>
      <polygon points="0,-38 10,-27 0,-16 -10,-27" transform="rotate(135)"/>
    </g>
  </g>
  <text x="200" y="276" font-family="system-ui,sans-serif" font-size="11" fill="rgba(255,255,255,.4)" text-anchor="middle" letter-spacing="2">MANDALA SPINNER</text>
</svg>
