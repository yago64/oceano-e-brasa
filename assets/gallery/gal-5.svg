<svg viewBox="0 0 400 300" fill="none" xmlns="http://www.w3.org/2000/svg" width="400" height="300">
  <!-- Dragão Articulado — product photography mockup -->
  <defs>
    <radialGradient id="g5bg" cx="40%" cy="55%" r="70%">
      <stop offset="0%" stop-color="#0E2020"/>
      <stop offset="100%" stop-color="#050509"/>
    </radialGradient>
    <radialGradient id="g5glow" cx="40%" cy="55%" r="55%">
      <stop offset="0%" stop-color="#5ECFA8" stop-opacity=".22"/>
      <stop offset="100%" stop-color="#5ECFA8" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="g5grad" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%"   stop-color="#5ECFA8"/>
      <stop offset="50%"  stop-color="#85CFFF"/>
      <stop offset="100%" stop-color="#B8A9F5"/>
    </linearGradient>
    <filter id="g5blur"><feGaussianBlur stdDeviation="20"/></filter>
    <filter id="g5gf"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="400" height="300" fill="url(#g5bg)"/>
  <ellipse cx="180" cy="155" rx="180" ry="120" fill="url(#g5glow)" filter="url(#g5blur)"/>
  <!-- Shadow -->
  <ellipse cx="200" cy="238" rx="100" ry="14" fill="#5ECFA8" opacity=".07"/>
  <!-- Dragon scaled up, repositioned -->
  <g transform="translate(60,220) scale(1.9)">
    <path d="M0,0 C20,-30 40,-50 60,-60 C80,-70 100,-70 120,-90 C130,-100 135,-112 130,-120"
      stroke="url(#g5grad)" stroke-width="5" stroke-linecap="round" filter="url(#g5gf)" opacity=".85"/>
    <g fill-opacity=".28" stroke-width="1.4">
      <ellipse cx="12" cy="-12" rx="18" ry="11" fill="#5ECFA8" stroke="#5ECFA8" transform="rotate(-35 12 -12)"/>
      <ellipse cx="28" cy="-28" rx="18" ry="11" fill="#5ECFA8" stroke="#5ECFA8" transform="rotate(-45 28 -28)"/>
      <ellipse cx="44" cy="-44" rx="18" ry="11" fill="#85CFFF" stroke="#85CFFF" transform="rotate(-50 44 -44)"/>
      <ellipse cx="60" cy="-60" rx="18" ry="11" fill="#85CFFF" stroke="#85CFFF" transform="rotate(-55 60 -60)"/>
      <ellipse cx="76" cy="-72" rx="16" ry="10" fill="#B8A9F5" stroke="#B8A9F5" transform="rotate(-60 76 -72)"/>
      <ellipse cx="92" cy="-82" rx="16" ry="10" fill="#B8A9F5" stroke="#B8A9F5" transform="rotate(-65 92 -82)"/>
      <ellipse cx="108" cy="-96" rx="14" ry="9"  fill="#5ECFA8" stroke="#5ECFA8" transform="rotate(-70 108 -96)"/>
      <ellipse cx="122" cy="-110" rx="12" ry="8"  fill="#5ECFA8" stroke="#5ECFA8" transform="rotate(-75 122 -110)"/>
    </g>
    <ellipse cx="130" cy="-120" rx="13" ry="11" fill="rgba(94,207,168,.35)" stroke="#5ECFA8" stroke-width="1.8" transform="rotate(-30 130 -120)"/>
    <circle cx="133" cy="-125" r="3" fill="#5ECFA8" opacity=".9"/>
    <circle cx="60" cy="-60" r="5" fill="#85CFFF" opacity=".85" filter="url(#g5gf)"/>
  </g>
  <text x="200" y="276" font-family="system-ui,sans-serif" font-size="11" fill="rgba(255,255,255,.4)" text-anchor="middle" letter-spacing="2">DRAGÃO ARTICULADO</text>
</svg>
